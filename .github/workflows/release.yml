name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Shadow JAR
        run: ./gradlew shadowJar
        
      - name: Rename JAR for Extension
        run: mv build/libs/gold-price-notifier-1.0.0-all.jar build/libs/gold-price-notifier-all.jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/gold-price-notifier-all.jar
            gemini-extension.json
            GEMINI.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
